# SimpleHA CI/CD Pipeline
# Automated build, test, security scan, and deployment pipeline
# Inspired by modern DevOps practices for cluster management software

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.0"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==============================
  # Stage 1: Code Quality & Lint
  # ==============================
  lint:
    name: "Code Quality & Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy

      - name: Run Black (code formatting)
        run: black --check --line-length 120 src/ tests/

      - name: Run Ruff (linting)
        run: ruff check --line-length 120 src/ tests/

      - name: Run MyPy (type checking)
        run: mypy --ignore-missing-imports src/

  # ==============================
  # Stage 2: Security Scan
  # ==============================
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (static security analysis)
        run: bandit -r src/ -f json -o bandit-report.json || true
        continue-on-error: true

      - name: Run Safety (dependency vulnerability scan)
        run: safety check --json --output safety-report.json || true
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # ==============================
  # Stage 3: Unit Tests
  # ==============================
  test:
    name: "Unit Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --cov=simpleha --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ==============================
  # Stage 4: Integration Tests
  # ==============================
  integration-test:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run integration tests
        run: pytest tests/integration/ -v --timeout=120
        env:
          SIMPLEHA_TEST_MODE: "1"

  # ==============================
  # Stage 5: Build Package
  # ==============================
  build:
    name: "Build Python Package"
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: pip install build twine

      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

  # ==============================
  # Stage 6: Build Docker Image
  # ==============================
  docker:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==============================
  # Stage 7: Deploy to Staging
  # ==============================
  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://simpleha-staging.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            echo "Deploying SimpleHA to staging..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
            docker stop simpleha-staging || true
            docker rm simpleha-staging || true
            docker run -d \
              --name simpleha-staging \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /etc/simpleha:/etc/simpleha:ro \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
            echo "Staging deployment complete!"

      - name: Health check (staging)
        run: |
          sleep 10
          curl -f http://${{ secrets.STAGING_HOST }}:8080/health || exit 1

  # ==============================
  # Stage 8: Deploy to Production
  # ==============================
  deploy-production:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: [docker, deploy-staging]
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://simpleha.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Blue-Green Deploy to production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "Blue-Green deployment: SimpleHA v${{ needs.build.outputs.version }}"

            # Deploy to green environment
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}

            docker stop simpleha-green || true
            docker rm simpleha-green || true

            docker run -d \
              --name simpleha-green \
              --restart unless-stopped \
              -p 8081:8080 \
              -v /etc/simpleha:/etc/simpleha:ro \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}

            # Health check green
            sleep 15
            curl -f http://localhost:8081/health || (echo "Green health check failed!" && exit 1)

            # Switch traffic (update load balancer or iptables)
            echo "Switching traffic to green environment..."
            # iptables or load balancer update here
            # For demonstration: swap ports
            docker stop simpleha-blue || true
            docker rm simpleha-blue || true
            docker rename simpleha-green simpleha-blue

            echo "Production deployment complete (blue-green switch done)!"

      - name: Create GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true

  # ==============================
  # Stage 9: Notify
  # ==============================
  notify:
    name: "Notify Deployment Status"
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            SimpleHA Deployment Status: ${{ job.status }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always() && secrets.SLACK_WEBHOOK_URL != ''
